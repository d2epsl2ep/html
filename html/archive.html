<!DOCTYPE html>
<!-- 归档页面：按月份分组展示所有文章 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — My Blog</title>
  <meta name="description" content="All blog posts archived by date.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 顶部固定导航栏 ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-title"><a href="index.html">My Blog</a></div>
      <nav>
        <button class="menu-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="archive.html" class="active">Archive</a></li>  <!-- active 高亮当前页 -->
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== 单栏布局 ===== -->
  <div class="page-wrap single-column" style="margin-top: 64px;">

    <main>
      <h1 class="page-title">Archive</h1>   <!-- 页面大标题 -->

      <!-- 归档列表容器，由 main.js 的 initArchive() 动态渲染 -->
      <div id="archive-list">
        <p class="loading-placeholder">Loading...</p>  <!-- 加载中占位 -->
      </div>
    </main>

  </div>

  <!-- ===== 页脚 ===== -->
  <footer class="site-footer">
    <p>&copy; 2026 <a href="index.html">My Blog</a>. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
