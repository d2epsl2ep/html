<!DOCTYPE html>
<!-- 文章详情页，根据 URL 参数 ?slug=xxx 动态加载 Markdown 内容 -->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — My Blog</title>                        <!-- 标题会在 JS 加载后被替换为文章标题 -->
  <meta name="description" content="Blog post">        <!-- 描述会在 JS 加载后被替换为文章摘要 -->
  <link rel="stylesheet" href="../css/style.css">          <!-- 全局样式 -->
</head>
<body>

  <!-- ===== 顶部固定导航栏（与首页一致） ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-title"><a href="index.html">My Blog</a></div>
      <nav>
        <button class="menu-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="archive.html">Archive</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ===== 两栏布局 ===== -->
  <div class="page-wrap" style="margin-top: 64px;">

    <!-- 左侧：文章内容 -->
    <main>
      <article>
        <!-- 文章头部（分类、日期、标题），由 main.js 的 initPost() 动态填充 -->
        <header class="post-header" id="post-header">
          <!-- Populated by main.js -->
        </header>

        <!-- 文章正文，由 marked.js 将 Markdown 渲染为 HTML 后填充 -->
        <div class="post-content" id="post-content">
          <!-- Markdown content rendered by main.js -->
        </div>

        <!-- 上/下篇文章导航，由 main.js 动态渲染 -->
        <nav class="post-nav" id="post-nav">
          <!-- Prev/Next populated by main.js -->
        </nav>
      </article>
    </main>

    <!-- ===== 右侧边栏（与首页相同结构） ===== -->
    <aside class="sidebar">
      <div class="sidebar-widget about-widget">
        <h3>About</h3>
        <div class="avatar"><span>M</span></div>
        <p>Writer &amp; developer. I write about code, design, and the quiet things in life.</p>
        <div class="social-links">
          <a href="#">GitHub</a>
          <a href="#">Twitter</a>
          <a href="#">RSS</a>
        </div>
      </div>

      <!-- 分类列表，由 main.js 动态渲染 -->
      <div class="sidebar-widget">
        <h3>Categories</h3>
        <ul class="category-list" id="sidebar-categories">
          <li class="loading-placeholder">Loading...</li>
        </ul>
      </div>

      <!-- 最新文章列表，由 main.js 动态渲染 -->
      <div class="sidebar-widget">
        <h3>Recent Posts</h3>
        <ul class="recent-posts-list" id="sidebar-recent">
          <li class="loading-placeholder">Loading...</li>
        </ul>
      </div>

      <!-- 标签云，由 main.js 动态渲染 -->
      <div class="sidebar-widget">
        <h3>Tags</h3>
        <div class="tag-cloud" id="sidebar-tags">
          <span class="loading-placeholder">Loading...</span>
        </div>
      </div>
    </aside>

  </div>

  <!-- ===== 页脚 ===== -->
  <footer class="site-footer">
    <p>&copy; 2026 <a href="index.html">My Blog</a>. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
